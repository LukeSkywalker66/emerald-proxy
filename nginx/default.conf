# 1. EL REDIRECTOR GLOBAL (Manda todo a HTTPS)
server {
    listen 80;
    server_name emerald.2finternet.ar emerald-test.2finternet.ar emerald-dev.2finternet.ar;
    client_max_body_size 20m;

    # Dejamos abierta la puerta trasera por si Certbot necesita renovar
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. PRODUCCIÓN (El Oficial)
server {
    listen 443 ssl;
    server_name emerald.2finternet.ar;
    client_max_body_size 20m;

    ssl_certificate /etc/letsencrypt/live/emerald.2finternet.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/emerald.2finternet.ar/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://emerald_nginx:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Soporte para WebSockets (Vite y Beholder)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

